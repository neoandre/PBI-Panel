name: Build Power BI Visual (.pbiviz)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Show working directory
        run: |
          pwd
          ls -la
      - name: Install dependencies
        run: npm install
      - name: Install Power BI Visuals Tools (pbiviz)
        run: npm install -g powerbi-visuals-tools@latest
      - name: Package visual
        run: npx pbiviz package
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-card-visual
          path: dist/*.pbiviz
          if-no-files-found: error
